name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Configure cargo linker
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang"
          EOF

      - name: Build release binary
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cargo build --release --target aarch64-linux-android

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "ver=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "ver=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Package flashable zip
        run: |
          VER="${{ steps.version.outputs.ver }}"
          ZIPNAME="uperf-${VER}.zip"

          cp -r module pkg

          mkdir -p pkg/bin
          cp target/aarch64-linux-android/release/uperf pkg/bin/uperf

          mkdir -p pkg/config
          cp config/*.json pkg/config/

          sed -i "s/^version=.*/version=${VER}/" pkg/module.prop
          sed -i "s/^versionCode=.*/versionCode=$(date +%Y%m%d)/" pkg/module.prop

          cd pkg
          zip -r9 "../${ZIPNAME}" . --exclude "*.placeholder"
          # 二进制用 store 模式（安装时不需要解压缩，节省时间）
          zip -r0 "../${ZIPNAME}" bin/uperf
          cd ..

          echo "ZIPNAME=${ZIPNAME}" >> $GITHUB_ENV
          ls -lh "${ZIPNAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uperf-zip
          path: ${{ env.ZIPNAME }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIPNAME }}
          generate_release_notes: true
